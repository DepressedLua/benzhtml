<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бензин Астрахань - 2ГИС</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #f5f5f7; --surface: #ffffff; --surface2: #e8e8ed;
            --text: #1d1d1f; --text-secondary: #86868b; --border: #d2d2d7;
            --shadow: rgba(0,0,0,0.06); --btn-bg: #fff; --btn-border: #c7c7cc;
            --btn-selected-bg: #e8f2ff; --btn-selected-border: #007aff; --btn-selected-text: #007aff;
            --has-fuel: #34c759; --no-fuel: #ff3b30; --accent: #007aff;
            --panel-bg: #fff; --badge-fuel-bg: #dbf7e2; --badge-fuel-text: #148528;
            --badge-no-fuel-bg: #ffe5e5; --badge-no-fuel-text: #d40000;
            --badge-queue-bg: #fff3cd; --badge-queue-text: #856404;
            --comment-bg: #f5f5f7; --legend-bg: rgba(255,255,255,0.95);
            --filter-bg: rgba(255,255,255,0.95);
            --lukoil-color: #e31837; --gazprom-color: #005baa;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04); --shadow-md: 0 8px 32px rgba(0,0,0,0.1);
            --radius-sm: 10px; --radius-md: 16px; --radius-lg: 20px;
        }
        [data-theme="dark"] {
            --bg: #0d0d0f; --surface: #1c1c1e; --surface2: #2c2c2e;
            --text: #f5f5f7; --text-secondary: #98989d; --border: #3a3a3c;
            --shadow: rgba(0,0,0,0.4); --btn-bg: #2c2c2e; --btn-border: #48484a;
            --btn-selected-bg: #1a3350; --btn-selected-border: #0a84ff; --btn-selected-text: #0a84ff;
            --has-fuel: #30d158; --no-fuel: #ff453a; --accent: #0a84ff;
            --panel-bg: #1c1c1e; --badge-fuel-bg: #1a3d24; --badge-fuel-text: #30d158;
            --badge-no-fuel-bg: #3d1a1a; --badge-no-fuel-text: #ff453a;
            --badge-queue-bg: #3d3520; --badge-queue-text: #ffd60a;
            --comment-bg: #2c2c2e; --legend-bg: rgba(28,28,30,0.95);
            --filter-bg: rgba(28,28,30,0.95);
            --lukoil-color: #ff3b5c; --gazprom-color: #4da6ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; height: 100dvh; display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
            transition: background 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            padding: 10px 16px; background: var(--surface);
            border-bottom: 1px solid var(--border); z-index: 2000; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { font-size: 24px; }
        .header-text h1 { font-size: 15px; font-weight: 700; line-height: 1.2; letter-spacing: -0.2px; }
        .header-text .subtitle { font-size: 10px; color: var(--text-secondary); font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 6px; }
        .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #34c759; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .theme-btn {
            width: 32px; height: 32px; border-radius: 16px;
            border: 1.5px solid var(--border); background: var(--surface);
            cursor: pointer; font-size: 15px; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .theme-btn:active { transform: scale(0.93); }

        /* КОНТЕЙНЕР КАРТЫ */
        #map-container {
            flex: 1; width: 100%; position: relative; z-index: 1;
        }
        #map {
            width: 100%; height: 100%; border: none;
        }

        /* ФИЛЬТРЫ ПОВЕРХ КАРТЫ */
        .overlay-panel {
            position: absolute; z-index: 1000; pointer-events: none;
        }
        .overlay-panel > * { pointer-events: auto; }
        .filter-panel {
            position: absolute; top: 10px; left: 10px;
            background: var(--filter-bg); padding: 5px; border-radius: var(--radius-md);
            box-shadow: var(--shadow-md); display: flex; flex-direction: column; gap: 1px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border); min-width: 150px;
        }
        .filter-title {
            font-size: 8px; text-transform: uppercase; color: var(--text-secondary);
            padding: 5px 10px 2px; letter-spacing: 1.5px; font-weight: 700;
        }
        .filter-btn {
            padding: 6px 9px; border-radius: var(--radius-sm); border: none;
            background: transparent; font-size: 11px; font-weight: 600;
            cursor: pointer; text-align: left; color: var(--text);
            transition: all 0.12s; display: flex; align-items: center; gap: 7px;
        }
        .filter-btn.active { background: var(--accent); color: #fff; }
        .filter-btn:active { transform: scale(0.97); }
        .filter-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .filter-count {
            margin-left: auto; font-size: 9px; font-weight: 600;
            background: var(--surface2); padding: 1px 7px; border-radius: 9px; min-width: 20px; text-align: center;
        }
        .filter-btn.active .filter-count { background: rgba(255,255,255,0.2); }

        .legend {
            position: absolute; top: 10px; right: 10px;
            background: var(--legend-bg); padding: 7px 10px; border-radius: var(--radius-sm);
            font-size: 9px; box-shadow: var(--shadow-md); display: flex;
            flex-direction: column; gap: 3px; backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px); border: 1px solid var(--border);
        }
        .legend-item { display: flex; align-items: center; gap: 5px; font-weight: 500; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        /* ПАНЕЛЬ ОТЗЫВА */
        .comment-panel {
            position: absolute; bottom: 16px; right: 12px; left: 12px;
            background: var(--panel-bg); border-radius: var(--radius-lg);
            padding: 14px 16px; box-shadow: 0 -4px 30px var(--shadow);
            z-index: 1000; display: none; max-height: 48vh;
            overflow-y: auto; transition: all 0.2s ease;
            border: 1px solid var(--border);
        }
        .comment-panel.active { display: block; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } }
        .panel-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
        .panel-info h3 { font-size: 13px; font-weight: 700; line-height: 1.3; }
        .panel-info .addr { font-size: 10px; color: var(--text-secondary); margin-top: 1px; }
        .network-tag {
            display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 7px;
            border-radius: 10px; margin-top: 3px;
        }
        .tag-lukoil { background: #fde8ea; color: #c41230; }
        .tag-gazprom { background: #e1edf7; color: #004a8f; }
        [data-theme="dark"] .tag-lukoil { background: #3d1a1f; color: #ff6b7a; }
        [data-theme="dark"] .tag-gazprom { background: #1a2d40; color: #5baeff; }
        .close-btn {
            background: var(--surface2); border: none; width: 26px; height: 26px;
            border-radius: 13px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 13px; color: var(--text); flex-shrink: 0;
        }
        .close-btn:active { background: var(--border); }
        .stats-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .stat-chip {
            background: var(--surface2); padding: 7px 10px; border-radius: var(--radius-sm);
            font-size: 11px; font-weight: 600; flex: 1; text-align: center;
        }
        .stat-chip .label { font-size: 9px; color: var(--text-secondary); font-weight: 500; }
        .stat-chip .value { font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1.1; }
        .comments-list {
            display: flex; flex-direction: column; gap: 4px;
            max-height: 100px; overflow-y: auto; margin-bottom: 8px; padding-right: 2px;
        }
        .comment-item {
            background: var(--comment-bg); padding: 6px 9px; border-radius: var(--radius-sm);
            font-size: 11px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
        }
        .badge { padding: 2px 7px; border-radius: 12px; font-size: 9px; font-weight: 700; white-space: nowrap; }
        .badge-fuel { background: var(--badge-fuel-bg); color: var(--badge-fuel-text); }
        .badge-nofuel { background: var(--badge-no-fuel-bg); color: var(--badge-no-fuel-text); }
        .badge-queue { background: var(--badge-queue-bg); color: var(--badge-queue-text); }
        .badge-cars { background: #e8e0f0; color: #5b3a8c; }
        [data-theme="dark"] .badge-cars { background: #2d1f3d; color: #c4a6ff; }
        .comment-time { margin-left: auto; font-size: 9px; color: var(--text-secondary); }
        .form-section { display: flex; flex-direction: column; gap: 5px; }
        .form-label { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-row { display: flex; gap: 5px; }
        .btn {
            flex: 1; padding: 8px 6px; border: 2px solid var(--btn-border);
            border-radius: var(--radius-sm); background: var(--btn-bg); font-size: 12px;
            font-weight: 600; cursor: pointer; transition: all 0.12s;
            text-align: center; color: var(--text);
        }
        .btn.selected { border-color: var(--btn-selected-border); background: var(--btn-selected-bg); color: var(--btn-selected-text); }
        .btn:active { transform: scale(0.97); }
        .queue-input-group { display: none; }
        .queue-input-group.active { display: block; }
        .queue-input {
            width: 100%; padding: 8px 12px; border: 2px solid var(--btn-border);
            border-radius: var(--radius-sm); background: var(--btn-bg); font-size: 13px;
            color: var(--text); outline: none; font-weight: 600; text-align: center;
        }
        .queue-input:focus { border-color: var(--accent); }
        .queue-input::placeholder { color: var(--text-secondary); font-weight: 400; }
        .btn-submit {
            width: 100%; padding: 10px; background: var(--accent); color: #fff;
            border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
            cursor: pointer; margin-top: 2px; transition: all 0.15s;
        }
        .btn-submit:active { opacity: 0.85; transform: scale(0.98); }
        .btn-submit:disabled { background: #a0a0a5; cursor: not-allowed; opacity: 0.5; }
        .btn-submit:disabled:active { transform: none; }

        @media (max-width: 380px) {
            .header-text h1 { font-size: 14px; }
            .filter-panel { min-width: 135px; padding: 4px; }
            .filter-btn { font-size: 10px; padding: 5px 7px; }
            .stat-chip .value { font-size: 16px; }
            .comment-panel { padding: 10px 12px; right: 8px; left: 8px; }
        }
        .comments-list::-webkit-scrollbar { width: 2px; }
        .comments-list::-webkit-scrollbar-track { background: transparent; }
        .comments-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="header-logo">⛽</span>
            <div class="header-text">
                <h1>Бензин Астрахань</h1>
                <div class="subtitle">23 АЗС • Лукойл + Газпромнефть</div>
            </div>
        </div>
        <div class="header-right">
            <span class="sync-dot" id="syncDot"></span>
            <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <!-- КАРТА -->
    <div id="map-container">
        <div id="map"></div>
        
        <!-- ФИЛЬТРЫ -->
        <div class="filter-panel" style="position:absolute;top:10px;left:10px;">
            <div class="filter-title">🔍 Фильтр</div>
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">📍 Все <span class="filter-count" id="countAll">23</span></button>
            <button class="filter-btn" data-filter="has_fuel" onclick="setFilter('has_fuel',this)"><span class="filter-dot" style="background:#34c759"></span> Есть бензин <span class="filter-count" id="countHasFuel">0</span></button>
            <button class="filter-btn" data-filter="no_fuel" onclick="setFilter('no_fuel',this)"><span class="filter-dot" style="background:#ff3b30"></span> Нет бензина <span class="filter-count" id="countNoFuel">0</span></button>
            <button class="filter-btn" data-filter="no_data" onclick="setFilter('no_data',this)"><span class="filter-dot" style="background:#8e8e93"></span> Нет данных <span class="filter-count" id="countNoData">0</span></button>
            <div class="filter-title">🏷 Сеть</div>
            <button class="filter-btn" data-filter="lukoil" onclick="setFilter('lukoil',this)"><span class="filter-dot" style="background:var(--lukoil-color)"></span> Лукойл <span class="filter-count" id="countLukoil">7</span></button>
            <button class="filter-btn" data-filter="gazprom" onclick="setFilter('gazprom',this)"><span class="filter-dot" style="background:var(--gazprom-color)"></span> Газпромнефть <span class="filter-count" id="countGazprom">16</span></button>
        </div>

        <!-- ЛЕГЕНДА -->
        <div class="legend" style="position:absolute;top:10px;right:10px;">
            <div class="legend-item"><span class="legend-dot" style="background:var(--lukoil-color)"></span> Лукойл</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--gazprom-color)"></span> Газпромнефть</div>
            <div class="legend-item"><span class="legend-dot" style="background:#34c759"></span> Есть</div>
            <div class="legend-item"><span class="legend-dot" style="background:#ff3b30"></span> Нет</div>
        </div>

        <!-- ПАНЕЛЬ ОТЗЫВА -->
        <div class="comment-panel" id="commentPanel" style="position:absolute;bottom:16px;right:12px;left:12px;">
            <div class="panel-header">
                <div class="panel-info">
                    <h3 id="stationName">АЗС</h3>
                    <div class="addr" id="stationAddress"></div>
                    <span class="network-tag" id="networkTag"></span>
                </div>
                <button class="close-btn" onclick="closePanel()">✕</button>
            </div>
            <div class="stats-row">
                <div class="stat-chip"><div class="label">Шанс бензина</div><div class="value" id="fuelChance">--%</div></div>
                <div class="stat-chip"><div class="label">Очередь (средняя)</div><div class="value" id="avgQueue">--</div></div>
            </div>
            <div class="comments-list" id="commentsList"><div style="color:var(--text-secondary);text-align:center;font-size:11px;padding:6px;">Нет отзывов</div></div>
            <div class="form-section">
                <div class="form-label">Бензин?</div>
                <div class="btn-row" id="fuelBtns">
                    <div class="btn" data-value="yes" onclick="selectBtn(this,'fuel')">✅ Есть</div>
                    <div class="btn" data-value="no" onclick="selectBtn(this,'fuel')">❌ Нет</div>
                </div>
                <div class="queue-input-group" id="queueGroup">
                    <div class="form-label">Очередь?</div>
                    <div class="btn-row" id="queueBtns">
                        <div class="btn" data-value="yes" onclick="selectBtn(this,'queue')">🚗 Есть</div>
                        <div class="btn" data-value="no" onclick="selectBtn(this,'queue')">✅ Нет</div>
                    </div>
                    <div class="queue-input-group" id="carsGroup">
                        <div class="form-label">Сколько машин?</div>
                        <input type="number" class="queue-input" id="carsCount" placeholder="5" min="1" max="99">
                    </div>
                </div>
            </div>
            <button class="btn-submit" id="submitBtn" onclick="submitComment()">📝 Отправить</button>
        </div>
    </div>

    <!-- 2GIS API -->
    <script src="https://maps.api.2gis.ru/2.0/loader.js?pkg=full"></script>

                    fullscreenControl: false,
                    // Стиль как Google Maps
                    preferCanvas: true,
                    geolocation: false

                // Зум в левый нижний угол
                DG.control.zoom({ position: 'bottomleft' }).addTo(map);
                
                // Группа для маркеров

                markersLayer.addTo(map);
                
                // Загружаем маркеры

        function initData() {
            let data = localStorage.getItem(STORAGE_KEY);
            if (!data) {
                const initial = {};
                DEFAULT_STATIONS.forEach(s => { initial[s.id] = {...s, comments:[]}; });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(initial));
                return initial;
            }
            const saved = JSON.parse(data);
            DEFAULT_STATIONS.forEach(s => {
                if (!saved[s.id]) saved[s.id] = {...s, comments:[]};
                else Object.assign(saved[s.id], s);
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
            return saved;
        }
        function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

        let stationsData = initData();
        let selectedStationId = null, selectedFuel = null, selectedQueue = null, currentFilter = 'all';

        // ==================== СИНХРОНИЗАЦИЯ ====================
        async function loadCommentsFromServer() {
            try {
                const r = await fetch(`${API_BASE}/comments`);
                if (!r.ok) throw new Error('Network');
                const server = await r.json();
                Object.entries(server).forEach(([sid, comments]) => {
                    if (stationsData[sid]) {
                        const local = stationsData[sid].comments || [];
                        const serverTs = new Set(comments.map(c => c.timestamp));
                        stationsData[sid].comments = [...comments, ...local.filter(c => !serverTs.has(c.timestamp))]
                            .sort((a,b) => b.timestamp - a.timestamp).slice(0, 200);
                    }
                });
                saveData(stationsData);
                document.getElementById('syncDot').style.background = '#34c759';
            } catch {
                document.getElementById('syncDot').style.background = '#ff9500';
            }
        }
        async function submitToServer(sid, comment) {
            try {
                await fetch(`${API_BASE}/comments`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({station_id:sid, comment})
                });
                return true;
            } catch { return false; }
        }

        // ==================== ТЕМА ====================
        function initTheme() {
            const s = localStorage.getItem(THEME_KEY) || 'light';
            document.documentElement.setAttribute('data-theme', s);
            document.getElementById('themeToggle').textContent = s === 'dark' ? '☀️' : '🌙';
        }
        function toggleTheme() {
            const c = document.documentElement.getAttribute('data-theme') || 'light';
            const n = c === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', n);
            localStorage.setItem(THEME_KEY, n);
            document.getElementById('themeToggle').textContent = n === 'dark' ? '☀️' : '🌙';
        }

        // ==================== МАРКЕРЫ НА 2ГИС ====================
        function getFuelProbability(c) {
            if (!c.length) return null;
            const recent = c.filter(x => (Date.now() - x.timestamp) < 4*3600000);
            const pool = recent.length ? recent : c;
            const yes = pool.filter(x => x.hasFuel).length;
            return {probability: yes/pool.length, total: pool.length};
        }
        function getAvgQueue(c) {
            const withCars = c.filter(x => x.hasFuel && x.hasQueue && x.carsCount > 0);
            if (!withCars.length) return null;
            const avg = withCars.reduce((s,x) => s + x.carsCount, 0) / withCars.length;
            return {avg: Math.round(avg*10)/10, total: withCars.length};
        }
        function getStatus(sid) {
            const s = stationsData[sid];
            if (!s || !s.comments.length) return 'no_data';
            const fp = getFuelProbability(s.comments);
            if (!fp) return 'no_data';
            const latest = s.comments.reduce((a,b)=>a.timestamp>b.timestamp?a:b);
            if ((Date.now()-latest.timestamp) > 2*3600000) return 'outdated';
            return fp.probability >= 0.5 ? 'has_fuel' : 'no_fuel';
        }
        function getColor(sid) {
            const s = stationsData[sid];
            if (!s || !s.comments.length) return s?.network==='lukoil'?'#e31837':'#005baa';
            const st = getStatus(sid);
            if (st==='has_fuel') return '#34c759';
            if (st==='no_fuel') return '#ff3b30';
            if (st==='outdated') return '#ffcc00';
            return s?.network==='lukoil'?'#e31837':'#005baa';
        }

        function renderMarkers() {
            if (!markersLayer) return;
            markersLayer.clearLayers();
            
            Object.values(stationsData).forEach(s => {
                const st = getStatus(s.id);
                if (currentFilter==='has_fuel' && st!=='has_fuel') return;
                if (currentFilter==='no_fuel' && st!=='no_fuel') return;
                if (currentFilter==='no_data' && st!=='no_data' && st!=='outdated') return;
                if (currentFilter==='lukoil' && s.network!=='lukoil') return;
                if (currentFilter==='gazprom' && s.network!=='gazprom') return;

                const color = getColor(s.id);
                const fp = getFuelProbability(s.comments);
                const aq = getAvgQueue(s.comments);
                const hasComments = s.comments.length > 0;
                
                // Круглый маркер 2ГИС
                const marker = DG.marker([s.lat, s.lng], {
                    icon: DG.icon({
                        iconUrl: createCircleIcon(color, hasComments ? 14 : 10),
                        iconSize: [hasComments ? 28 : 20, hasComments ? 28 : 20],
                        iconAnchor: [hasComments ? 14 : 10, hasComments ? 14 : 10]
                    })
                });
                
                let popup = `<b>${s.name}</b><br>${s.address}<br><small>${s.orient||''}</small>`;
                if (fp) popup += `<br><br>⛽ Бензин: <b>${Math.round(fp.probability*100)}%</b> (${fp.total} отз.)`;
                else popup += `<br><br><i>Нет данных</i>`;
                if (aq) popup += `<br>🚗 Очередь: ~<b>${aq.avg}</b> машин`;
                popup += `<br><small>▶ Нажмите для деталей</small>`;
                
                marker.bindPopup(popup);
                marker.on('click', () => openPanel(s.id));
                markersLayer.addLayer(marker);
            });
            updateCounts();
        }

        function createCircleIcon(color, radius) {
            // SVG кружок для 2ГИС
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${radius*2}" height="${radius*2}">
                <circle cx="${radius}" cy="${radius}" r="${radius-1}" fill="${color}" stroke="#fff" stroke-width="2"/>
            </svg>`;
            return 'data:image/svg+xml,' + encodeURIComponent(svg);
        }

        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMarkers();
        }
        function updateCounts() {
            let c = {all:0, has_fuel:0, no_fuel:0, no_data:0, lukoil:0, gazprom:0};
            Object.values(stationsData).forEach(s => {
                c.all++; if(s.network==='lukoil')c.lukoil++; if(s.network==='gazprom')c.gazprom++;
                const st = getStatus(s.id);
                if(st==='has_fuel')c.has_fuel++; else if(st==='no_fuel')c.no_fuel++; else c.no_data++;
            });
            ['All','HasFuel','NoFuel','NoData','Lukoil','Gazprom'].forEach(k => {
                const el = document.getElementById('count'+k); if(el) el.textContent = c[k.toLowerCase()];
            });
        }

        // ==================== ПАНЕЛЬ ====================
        function openPanel(sid) {
            selectedStationId = sid; const s = stationsData[sid];
            document.getElementById('stationName').textContent = s.name;
            document.getElementById('stationAddress').textContent = s.address + ' • ' + (s.orient||'');
            const tag = document.getElementById('networkTag');
            tag.textContent = s.network==='lukoil'?'Лукойл':'Газпромнефть';
            tag.className = 'network-tag ' + (s.network==='lukoil'?'tag-lukoil':'tag-gazprom');
            resetForm(); updateStats(); renderComments(); updateSubmit();
            document.getElementById('commentPanel').classList.add('active');
        }
        function closePanel() {
            document.getElementById('commentPanel').classList.remove('active');
            selectedStationId = null; resetForm();
        }
        function resetForm() {
            selectedFuel = null; selectedQueue = null;
            document.querySelectorAll('#fuelBtns .btn,#queueBtns .btn').forEach(b=>b.classList.remove('selected'));
            document.getElementById('queueGroup').classList.remove('active');
            document.getElementById('carsGroup').classList.remove('active');
            document.getElementById('carsCount').value = '';
        }
        function selectBtn(btn, type) {
            btn.parentElement.querySelectorAll('.btn').forEach(b=>b.classList.remove('selected'));
            btn.classList.add('selected');
            if (type==='fuel') {
                selectedFuel = btn.dataset.value;
                const qg = document.getElementById('queueGroup');
                if (selectedFuel==='yes') qg.classList.add('active');
                else { qg.classList.remove('active'); document.getElementById('carsGroup').classList.remove('active'); selectedQueue=null; }
            } else {
                selectedQueue = btn.dataset.value;
                const cg = document.getElementById('carsGroup');
                if (selectedQueue==='yes') { cg.classList.add('active'); document.getElementById('carsCount').focus(); }
                else { cg.classList.remove('active'); document.getElementById('carsCount').value=''; }
            }
            updateSubmit();
        }
        function updateSubmit() { document.getElementById('submitBtn').disabled = !selectedFuel; }
        function updateStats() {
            if (!selectedStationId) return;
            const fp = getFuelProbability(stationsData[selectedStationId].comments);
            const aq = getAvgQueue(stationsData[selectedStationId].comments);
            document.getElementById('fuelChance').textContent = fp ? Math.round(fp.probability*100)+'%' : '--%';
            document.getElementById('avgQueue').textContent = aq ? '~'+aq.avg+' маш.' : '--';
        }
        function renderComments() {
            if (!selectedStationId) return;
            const comments = stationsData[selectedStationId].comments;
            const list = document.getElementById('commentsList');
            if (!comments.length) { list.innerHTML = '<div style="color:var(--text-secondary);text-align:center;font-size:11px;padding:6px;">Нет отзывов</div>'; return; }
            list.innerHTML = [...comments].sort((a,b)=>b.timestamp-a.timestamp).slice(0,20).map(c => {
                const t = new Date(c.timestamp);
                let badges = `<span class="badge ${c.hasFuel?'badge-fuel':'badge-nofuel'}">${c.hasFuel?'✅ Есть':'❌ Нет'}</span>`;
                if (c.hasFuel && c.hasQueue) badges += `<span class="badge badge-queue">🚗 Очередь</span>`;
                if (c.hasQueue && c.carsCount > 0) badges += `<span class="badge badge-cars">${c.carsCount} маш.</span>`;
                if (c.hasFuel && !c.hasQueue) badges += `<span class="badge badge-fuel">✅ Свободно</span>`;
                return `<div class="comment-item">${badges}<span class="comment-time">${t.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'})} ${t.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</span></div>`;
            }).join('');
        }
        async function submitComment() {
            if (!selectedStationId || !selectedFuel) return;
            const carsVal = parseInt(document.getElementById('carsCount').value) || 0;
            const comment = {
                hasFuel: selectedFuel==='yes',
                hasQueue: selectedFuel==='yes' ? selectedQueue==='yes' : false,
                carsCount: (selectedFuel==='yes' && selectedQueue==='yes') ? carsVal : 0,
                timestamp: Date.now(),
                userId: window.Telegram?.WebApp?.initDataUnsafe?.user?.id?.toString() || 'anon'
            };
            stationsData[selectedStationId].comments.push(comment);
            saveData(stationsData);
            const synced = await submitToServer(selectedStationId, comment);
            updateStats(); renderComments(); renderMarkers(); resetForm(); updateSubmit();
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred(synced?'success':'warning');
            }
            if (synced) setTimeout(loadCommentsFromServer, 1500);
        }

        // ==================== TELEGRAM ====================
        if (window.Telegram?.WebApp) {
            const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
            if (tg.themeParams.bg_color && !localStorage.getItem(THEME_KEY)) {
                if (!['#ffffff','#fff'].includes(tg.themeParams.bg_color.toLowerCase())) {
                    document.documentElement.setAttribute('data-theme','dark');
                    document.getElementById('themeToggle').textContent = '☀️';
                }
            }
        }

        // ==================== СТАРТ ====================
        initTheme();
        init2GIS();
        setInterval(loadCommentsFromServer, 30000);
        setInterval(renderMarkers, 60000);
    </script>
