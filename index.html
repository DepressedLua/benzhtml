        :root {

        .filter-wrapper { position: absolute; top: 10px; left: 10px; z-index: 1000; background: var(--filter-bg); border-radius: var(--radius-md); box-shadow: var(--shadow-md); border: 1px solid var(--border); backdrop-filter: blur(24px); min-width: 155px; transition: all 0.3s; }
        .filter-wrapper.collapsed .filter-content { display: none; }
        .filter-toggle { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; cursor: pointer; font-size: 12px; font-weight: 700; gap: 6px; }

        .filter-btn { padding: 6px 9px; border-radius: var(--radius-sm); border: none; background: transparent; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 7px; color: var(--text); width: 100%; text-align: left; }

        .filter-dot { width: 9px; height: 9px; border-radius: 50%; }

        .filter-btn.active .filter-count { background: rgba(255,255,255,0.2); }
        .legend { position: absolute; top: 10px; right: 10px; background: var(--legend-bg); padding: 7px 10px; border-radius: var(--radius-sm); font-size: 9px; box-shadow: var(--shadow-md); z-index: 1000; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; }

        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
        .comment-panel { position: absolute; bottom: 20px; right: 12px; left: 12px; background: var(--panel-bg); border-radius: var(--radius-lg); padding: 14px 16px; box-shadow: 0 -4px 30px var(--shadow); z-index: 1000; display: none; max-height: 55vh; overflow-y: auto; border: 1px solid var(--border); }
        .comment-panel.active { display: block !important; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } }
        .panel-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .panel-info h3 { font-size: 13px; font-weight: 700; }
        .close-btn { background: var(--surface2); border: none; width: 26px; height: 26px; border-radius: 13px; cursor: pointer; font-size: 13px; color: var(--text); }
        .stats-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }

        .comments-list { display: flex; flex-direction: column; gap: 5px; max-height: 120px; overflow-y: auto; margin-bottom: 8px; padding-right: 2px; }

        .subscribe-btn { padding: 6px 12px !important; font-size: 11px !important; white-space: nowrap !important; flex: 0 !important; min-width: auto !important; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left"><span class="header-logo">⛽</span><div class="header-text"><h1>Бензин Астрахань</h1><div class="subtitle">55 АЗС • Онлайн</div></div></div>

                <div class="filter-title">Статус</div>
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">📍 Все <span class="filter-count" id="countAll">55</span></button>
                <button class="filter-btn" data-filter="has_fuel" onclick="setFilter('has_fuel',this)"><span class="filter-dot" style="background:#34c759"></span> Есть <span class="filter-count" id="countHasFuel">0</span></button>
                <button class="filter-btn" data-filter="no_fuel" onclick="setFilter('no_fuel',this)"><span class="filter-dot" style="background:#ff3b30"></span> Нет <span class="filter-count" id="countNoFuel">0</span></button>
                <div class="filter-title">Топливо</div>
                <button class="filter-btn" data-filter="fuel_92" onclick="setFilter('fuel_92',this)"><span class="filter-dot" style="background:var(--fuel-92)"></span> АИ-92 <span class="filter-count" id="countFuel92">0</span></button>
                <button class="filter-btn" data-filter="fuel_95" onclick="setFilter('fuel_95',this)"><span class="filter-dot" style="background:var(--fuel-95)"></span> АИ-95 <span class="filter-count" id="countFuel95">0</span></button>
                <button class="filter-btn" data-filter="fuel_100" onclick="setFilter('fuel_100',this)"><span class="filter-dot" style="background:var(--fuel-100)"></span> АИ-100 <span class="filter-count" id="countFuel100">0</span></button>
                <button class="filter-btn" data-filter="fuel_dt" onclick="setFilter('fuel_dt',this)"><span class="filter-dot" style="background:var(--fuel-dt)"></span> ДТ <span class="filter-count" id="countFuelDT">0</span></button>
            </div>
        </div>
        <div class="legend">
            <div class="legend-item"><span class="legend-dot" style="background:var(--fuel-92)"></span> 92</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--fuel-95)"></span> 95</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--fuel-100)"></span> 100</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--fuel-dt)"></span> ДТ</div>
            <div class="legend-item"><span class="legend-dot" style="background:#ff3b30"></span> Нет</div>
        </div>
        <div class="comment-panel" id="commentPanel">
            <div class="panel-header"><div class="panel-info"><h3 id="stationName">АЗС</h3></div><button class="close-btn" onclick="closePanel()">✕</button></div>
            <div class="stats-row">
                <div class="stat-chip"><div class="label">92</div><div class="value" id="fuel92">--%</div></div>
                <div class="stat-chip"><div class="label">95</div><div class="value" id="fuel95">--%</div></div>
                <div class="stat-chip"><div class="label">100</div><div class="value" id="fuel100">--%</div></div>
                <div class="stat-chip"><div class="label">ДТ</div><div class="value" id="fuelDT">--%</div></div>
                <div class="stat-chip"><div class="label">Очередь</div><div class="value" id="avgQueue">--</div></div>
            </div>
            <div class="comments-list" id="commentsList"><div style="color:var(--text-secondary);text-align:center;font-size:11px;padding:6px;">Нет отзывов</div></div>

            </div>

                <div class="form-label">Какой бензин?</div>

                <div class="queue-input-group" id="queueGroup">
                    <div class="form-label">Очередь?</div>
                    <div class="btn-row" id="queueBtns"><div class="btn" data-value="yes" onclick="selectBtn(this,'queue')">🚗 Есть</div><div class="btn" data-value="no" onclick="selectBtn(this,'queue')">✅ Нет</div></div>
                    <div class="queue-input-group" id="carsGroup"><div class="form-label">Сколько машин?</div><input type="number" class="queue-input" id="carsCount" placeholder="5" min="1" max="99"></div>
                </div>
            </div>
            <button class="btn-submit" id="submitBtn" onclick="submitComment()">📝 Отправить</button>
        </div>
    </div>

        const DEFAULT_STATIONS = [

        ];

        let stationsData, selectedStationId=null, selectedFuel=null, selectedQueue=null, selectedFuelTypes=new Set(), currentFilter='all', isSubscribed=false;

        function initData() { let d=localStorage.getItem(STORAGE_KEY); if(!d){ const i={}; DEFAULT_STATIONS.forEach(s=>i[s.id]={...s,comments:[]}); localStorage.setItem(STORAGE_KEY,JSON.stringify(i)); return i; } const s=JSON.parse(d); DEFAULT_STATIONS.forEach(x=>{ if(!s[x.id]) s[x.id]={...x,comments:[]}; else Object.assign(s[x.id],x); }); localStorage.setItem(STORAGE_KEY,JSON.stringify(s)); return s; }
        function saveData(d) { localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); }

        function init2GIS() { DG.then(()=>{ map=DG.map('map',{center:[46.355,48.045],zoom:12,zoomControl:false,fullscreenControl:false,preferCanvas:true,geolocation:false,dragging:true,scrollWheelZoom:true,touchZoom:true,doubleClickZoom:true}); DG.control.zoom({position:'bottomright'}).addTo(map); markersLayer=DG.featureGroup().addTo(map); loadCommentsFromServer().then(()=>renderMarkers()); }); }

        function toggleFilter() { document.getElementById('filterWrapper').classList.toggle('collapsed'); }
        function toggleTheme() { const c=document.documentElement.getAttribute('data-theme')||'light',n=c==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem(THEME_KEY,n); document.getElementById('themeToggle').textContent=n==='dark'?'☀️':'🌙'; }
        function getUserId() { return window.Telegram?.WebApp?.initDataUnsafe?.user?.id?.toString()||null; }

        async function checkSubscription(sid) { const uid=getUserId(); if(!uid) return; try{ const r=await fetch(`${API_BASE}/subscriptions?user_id=${uid}`); const d=await r.json(); isSubscribed=d[sid]===true; updateSubBtn(); }catch{} }
        function updateSubBtn() { const b=document.getElementById('subscribeBtn'); if(b) b.textContent=isSubscribed?'🔕 Отписаться':'🔔 Подписаться'; }
        async function toggleSubscription() { const uid=getUserId(); if(!uid||!selectedStationId) return; const ep=isSubscribed?'unsubscribe':'subscribe'; try{ const r=await fetch(`${API_BASE}/${ep}`,{method:'POST',mode:'cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({station_id:selectedStationId.toString(),user_id:uid})}); if(r.ok){ isSubscribed=!isSubscribed; updateSubBtn(); } }catch(e){ console.log(e); } }

        async function loadCommentsFromServer() { try{ const r=await fetch(`${API_BASE}/comments`,{mode:'cors'}); if(!r.ok) throw new Error(''); const srv=await r.json(); Object.entries(srv).forEach(([sid,cmts])=>{ if(stationsData[sid]){ const loc=stationsData[sid].comments||[],ts=new Set(cmts.map(c=>c.timestamp)); stationsData[sid].comments=[...cmts,...loc.filter(c=>!ts.has(c.timestamp))].sort((a,b)=>b.timestamp-a.timestamp).slice(0,200); } }); saveData(stationsData); document.getElementById('syncDot').style.background='#34c759'; }catch(e){ document.getElementById('syncDot').style.background='#ff9500'; } }
        async function submitToServer(sid,cmt) { try{ await fetch(`${API_BASE}/comments`,{method:'POST',mode:'cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({station_id:sid,comment:cmt})}); return true; }catch{ return false; } }

        function getFuelProb(c,type) { const f=c.filter(x=>x.hasFuel&&x.fuelTypes&&x.fuelTypes.includes(type)); if(!f.length) return null; const recent=f.filter(x=>(Date.now()-x.timestamp)<14400000),pool=recent.length?recent:f; return {prob:pool.length/Math.max(1,c.filter(x=>x.hasFuel).length),total:pool.length}; }
        function getAvgQ(c) { const w=c.filter(x=>x.hasFuel&&x.hasQueue&&x.carsCount>0); if(!w.length) return null; return {avg:Math.round(w.reduce((s,x)=>s+x.carsCount,0)/w.length*10)/10,total:w.length}; }
        function getStatus(sid) { const s=stationsData[sid]; if(!s||!s.comments.length) return 'no_data'; if(!s.comments.some(c=>c.hasFuel)) return 'no_fuel'; const lt=s.comments.reduce((a,b)=>a.timestamp>b.timestamp?a:b); if((Date.now()-lt.timestamp)>7200000) return 'outdated'; return 'has_fuel'; }
        function getColor(sid) { const st=getStatus(sid); return st==='has_fuel'?'#34c759':st==='no_fuel'?'#ff3b30':st==='outdated'?'#ffcc00':'#8e8e93'; }
        function getBestFuel(sid) { const s=stationsData[sid]; if(!s) return '#8e8e93'; const fc=s.comments.filter(c=>c.hasFuel&&c.fuelTypes); if(!fc.length) return '#34c759'; const cnt={92:0,95:0,100:0,dt:0}; fc.forEach(c=>c.fuelTypes.forEach(t=>{if(cnt[t]!==undefined)cnt[t]++})); const mx=Math.max(...Object.values(cnt)); if(mx===0) return '#34c759'; return cnt[92]===mx?'#34c759':cnt[95]===mx?'#ff9500':cnt[100]===mx?'#ff3b30':'#007aff'; }

        function renderMarkers() { if(!markersLayer) return; markersLayer.clearLayers(); Object.values(stationsData).forEach(s=>{ const st=getStatus(s.id); if(currentFilter==='has_fuel'&&st!=='has_fuel') return; if(currentFilter==='no_fuel'&&st!=='no_fuel') return; if(currentFilter.startsWith('fuel_')){ if(!s.comments.some(c=>c.hasFuel&&c.fuelTypes&&c.fuelTypes.includes(currentFilter.replace('fuel_','')))) return; } const color=currentFilter.startsWith('fuel_')?getBestFuel(s.id):getColor(s.id),hc=s.comments.length>0; const mk=DG.marker([s.lat,s.lng],{icon:DG.icon({iconUrl:ci(color,hc?14:10),iconSize:[hc?28:20,hc?28:20],iconAnchor:[hc?14:10,hc?14:10]})}); let pp=`<b>${s.address}</b>`; ['92','95','100','dt'].forEach(t=>{const fp=getFuelProb(s.comments,t); if(fp) pp+=`<br>⛽ ${t.toUpperCase()}: <b>${Math.round(fp.prob*100)}%</b>`;}); const aq=getAvgQ(s.comments); if(aq) pp+=`<br>🚗 Очередь: ~<b>${aq.avg}</b> машин`; pp+=`<br><small>▶ Нажмите для отзыва</small>`; mk.bindPopup(pp); mk.on('click',()=>{ map.closePopup(); openPanel(s.id); }); markersLayer.addLayer(mk); }); updateCounts(); }
        function ci(c,r) { return 'data:image/svg+xml,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${r*2}" height="${r*2}"><circle cx="${r}" cy="${r}" r="${r-1}" fill="${c}" stroke="#fff" stroke-width="2"/></svg>`); }
        function setFilter(f,btn) { currentFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderMarkers(); }
        function updateCounts() { let c={all:0,has_fuel:0,no_fuel:0,f92:0,f95:0,f100:0,fdt:0}; Object.values(stationsData).forEach(s=>{c.all++; const st=getStatus(s.id); if(st==='has_fuel')c.has_fuel++; else if(st==='no_fuel')c.no_fuel++; if(s.comments.some(x=>x.hasFuel&&x.fuelTypes&&x.fuelTypes.includes('92')))c.f92++; if(s.comments.some(x=>x.hasFuel&&x.fuelTypes&&x.fuelTypes.includes('95')))c.f95++; if(s.comments.some(x=>x.hasFuel&&x.fuelTypes&&x.fuelTypes.includes('100')))c.f100++; if(s.comments.some(x=>x.hasFuel&&x.fuelTypes&&x.fuelTypes.includes('dt')))c.fdt++; }); document.getElementById('countAll').textContent=c.all; document.getElementById('countHasFuel').textContent=c.has_fuel; document.getElementById('countNoFuel').textContent=c.no_fuel; document.getElementById('countFuel92').textContent=c.f92; document.getElementById('countFuel95').textContent=c.f95; document.getElementById('countFuel100').textContent=c.f100; document.getElementById('countFuelDT').textContent=c.fdt; }
        function openPanel(sid) { selectedStationId=sid; document.getElementById('stationName').textContent=stationsData[sid].address; resetForm(); updateStats(); renderComments(); updateSubmit(); checkSubscription(sid); document.getElementById('commentPanel').classList.add('active'); }
        function closePanel() { document.getElementById('commentPanel').classList.remove('active'); selectedStationId=null; resetForm(); }
        function resetForm() { selectedFuel=null; selectedQueue=null; selectedFuelTypes.clear(); document.querySelectorAll('#fuelBtns .btn,#queueBtns .btn,#fuelTypeBtns .btn').forEach(b=>b.classList.remove('selected')); document.getElementById('fuelTypeGroup').classList.remove('active'); document.getElementById('queueGroup').classList.remove('active'); document.getElementById('carsGroup').classList.remove('active'); document.getElementById('carsCount').value=''; }
        function selectBtn(btn,type) { btn.parentElement.querySelectorAll('.btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); if(type==='fuel'){ selectedFuel=btn.dataset.value; const ftg=document.getElementById('fuelTypeGroup'); if(selectedFuel==='yes') ftg.classList.add('active'); else{ftg.classList.remove('active');document.getElementById('queueGroup').classList.remove('active');document.getElementById('carsGroup').classList.remove('active');selectedQueue=null;selectedFuelTypes.clear();} }else{ selectedQueue=btn.dataset.value; const cg=document.getElementById('carsGroup'); if(selectedQueue==='yes'){cg.classList.add('active');document.getElementById('carsCount').focus();}else{cg.classList.remove('active');document.getElementById('carsCount').value='';} } updateSubmit(); }
        function selectFuelType(btn) { const v=btn.dataset.value; if(btn.classList.contains('selected')){btn.classList.remove('selected');selectedFuelTypes.delete(v);}else{btn.classList.add('selected');selectedFuelTypes.add(v);} const qg=document.getElementById('queueGroup'); if(selectedFuelTypes.size>0) qg.classList.add('active'); else qg.classList.remove('active'); updateSubmit(); }
        function updateSubmit() { document.getElementById('submitBtn').disabled = !(selectedFuel==='yes'?selectedFuelTypes.size>0:selectedFuel==='no'); }
        function updateStats() { if(!selectedStationId) return; const c=stationsData[selectedStationId].comments; ['92','95','100','dt'].forEach(t=>{const fp=getFuelProb(c,t);document.getElementById('fuel'+t).textContent=fp?Math.round(fp.prob*100)+'%':'--%';}); const aq=getAvgQ(c);document.getElementById('avgQueue').textContent=aq?'~'+aq.avg+' маш.':'--'; }
        function renderComments() { if(!selectedStationId) return; const cmts=stationsData[selectedStationId].comments,list=document.getElementById('commentsList'); if(!cmts.length){list.innerHTML='<div style="color:var(--text-secondary);text-align:center;font-size:11px;padding:6px;">Нет отзывов</div>';return;} list.innerHTML=[...cmts].sort((a,b)=>b.timestamp-a.timestamp).slice(0,20).map(c=>{const t=new Date(c.timestamp),hours=(Date.now()-c.timestamp)/3600000,fresh=hours<1; let b=`<span class="badge ${c.hasFuel?'badge-fuel':'badge-nofuel'}">${c.hasFuel?'✅':'❌'}</span>`; if(c.hasFuel&&c.fuelTypes) c.fuelTypes.forEach(f=>{b+=`<span class="badge badge-${f}">${f.toUpperCase()}</span>`;}); if(c.hasFuel&&c.hasQueue) b+=`<span class="badge badge-queue">🚗</span>`; if(c.hasQueue&&c.carsCount>0) b+=`<span class="badge badge-cars">${c.carsCount} маш.</span>`; const timeStr=fresh?'🟢 Менее часа':`🔴 ${Math.floor(hours)} ч. назад`; return`<div class="comment-item ${fresh?'fresh':'old'}">${b}<span class="comment-time">${timeStr}</span></div>`; }).join(''); }
        async function submitComment() { if(!selectedStationId) return; if(selectedFuel==='no'){ const cmt={hasFuel:false,hasQueue:false,fuelTypes:[],carsCount:0,timestamp:Date.now(),userId:getUserId()||'anon'}; stationsData[selectedStationId].comments.push(cmt); saveData(stationsData); await submitToServer(selectedStationId,cmt); updateStats(); renderComments(); renderMarkers(); resetForm(); updateSubmit(); setTimeout(loadCommentsFromServer,1500); return; } if(selectedFuelTypes.size===0) return; const cmt={hasFuel:true,hasQueue:selectedQueue==='yes',fuelTypes:[...selectedFuelTypes],carsCount:(selectedQueue==='yes'?parseInt(document.getElementById('carsCount').value)||0:0),timestamp:Date.now(),userId:getUserId()||'anon'}; stationsData[selectedStationId].comments.push(cmt); saveData(stationsData); await submitToServer(selectedStationId,cmt); updateStats(); renderComments(); renderMarkers(); resetForm(); updateSubmit(); setTimeout(loadCommentsFromServer,1500); }

        (function(){ stationsData=initData(); const s=localStorage.getItem(THEME_KEY)||'light'; document.documentElement.setAttribute('data-theme',s); document.getElementById('themeToggle').textContent=s==='dark'?'☀️':'🌙'; if(window.Telegram?.WebApp){ const tg=window.Telegram.WebApp; tg.ready(); tg.expand(); if(tg.themeParams.bg_color&&!localStorage.getItem(THEME_KEY)&&!['#ffffff','#fff'].includes(tg.themeParams.bg_color.toLowerCase())){ document.documentElement.setAttribute('data-theme','dark'); document.getElementById('themeToggle').textContent='☀️'; } } init2GIS(); setInterval(loadCommentsFromServer,30000); setInterval(renderMarkers,60000); })();
    </script>
</body>
</html>
